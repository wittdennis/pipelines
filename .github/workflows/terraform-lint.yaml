name: terraform-lint

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: setup tflint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: "v0.62.1" # renovate: datasource=github-releases depName=terraform-linters/tflint versioning=semver

      - name: lint terraform
        run: |
          tflint --init --call-module-type=all --enable-rule=terraform_documented_variables --recursive
