name: release

on:
  workflow_call:
    inputs:
      check-latest-tag-only:
        default: false
        type: boolean
        description: "Only check commits from the latest tag onwards"
      ignore-merge-commits:
        required: false
        type: boolean
        description: Ignore merge commits
        default: false
      ignore-fixup-commits:
        required: false
        type: boolean
        description: Ignore fixup commits
        default: false
      release-files:
        default: ""
        description: Newline-delimited list of path globs for asset files to upload
        type: string
        required: false
      version:
        default: "auto"
        description: Can be used to set a specific version. Use 'auto' for automatic version calculation
        type: string
        required: false
    secrets:
      release-token:
        description: The token to use for the github release
        required: true

jobs:
  validate-commits:
    uses: ./.github/workflows/cog-validate.yaml
    name: check commits
    with:
      check-latest-tag-only: ${{ inputs.check-latest-tag-only }}
      ignore-merge-commits: ${{ inputs.ignore-merge-commits }}
      ignore-fixup-commits: ${{ inputs.ignore-fixup-commits }}

  release:
    runs-on: ubuntu-24.04
    needs: validate-commits
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.release-token }}
      - name: setup git config
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: install goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          install-only: true
          distribution: goreleaser
          version: "v2.17.0" # renovate: datasource=github-releases depName=goreleaser/goreleaser versioning=semver

      - name: set version command args
        id: args
        run: |
          if [ "${VERSION}" = "auto" ]; then
              echo "args=--auto" >>"$GITHUB_OUTPUT"
          else
              echo "args=--version ${VERSION}" >>"$GITHUB_OUTPUT"
          fi
        env:
          VERSION: "${{ inputs.version }}"

      - name: bump version
        id: release
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a # v4.2.0
        with:
          command: bump
          args: ${{ steps.args.outputs.args }}
          git-user: github-actions
          git-user-email: github-actions@github.com

      - name: generate changelog
        run: cog changelog --at ${{ steps.release.outputs.version }} > GITHUB_CHANGELOG.md

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        name: create release
        with:
          body_path: GITHUB_CHANGELOG.md
          tag_name: ${{ steps.release.outputs.version }}
          token: ${{ secrets.release-token }}
          files: ${{ inputs.release-files }}
