name: go-lint

on:
  workflow_call:
    inputs:
      go-version:
        default: "1.26.5" # renovate: datasource=github-tags depName=golang/go extractVersion=^go(?<version>.*)$ versioning=semver
        description: The Go version to download (if necessary) and use. Supports semver spec and ranges. Be sure to enclose this option in single quotation marks.
        type: string
      golangci-version:
        default: v2.12.2 # renovate: datasource=github-releases depName=golangci/golangci-lint versioning=semver
        description: "Version of golangci-lint to use"
        type: string
      working-directory:
        default: "."
        description: "golangci-lint working directory, default is project root"
        type: string

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: ${{ inputs.golangci-version }}
          working-directory: ${{ inputs.working-directory }}
