name: go-lint

on:
  workflow_call:
    inputs:
      go-version:
        default: "1.26.3" # renovate: datasource=github-tags depName=golang/go extractVersion=^go(?<version>.*)$ versioning=semver
        description: The Go version to download (if necessary) and use. Supports semver spec and ranges. Be sure to enclose this option in single quotation marks.
        type: string
      golangci-version:
        default: v2.12.2 # renovate: datasource=github-releases depName=golangci/golangci-lint versioning=semver
        description: "Version of golangci-lint to use"
        type: string
      working-directory:
        default: "."
        description: "golangci-lint working directory, default is project root"
        type: string

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ inputs.golangci-version }}
          working-directory: ${{ inputs.working-directory }}
