name: publish-image

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
        description: Name of the docker image to build
      registries:
        type: string
        default: "docker.io"
        description: |
          Newline-separated list of registries to push to.
          Example:
            docker.io
            ghcr.io
            registry.example.com
      registry-namespaces:
        type: string
        default: "denniswitt"
        description: |
          Newline-separated list of image namespaces/usernames, one per registry (same order as registries).
          Example:
            myDockerUser
            myGithubRepo
            myotheruser
      build-args:
        type: string
        default: ""
        description: Build args to pass in form of yaml content, each arg separated by a new line
      amd64-build-args:
        type: string
        default: ""
        description: Build args that are only passed to the amd64 platform build
      arm64-build-args:
        type: string
        default: ""
        description: Build args that are only passed to the arm64 platform build
    secrets:
      registry-passwords:
        required: true
        description: |
          Newline-separated list of passwords/tokens, one per registry (same order as registries).

jobs:
  build:
    uses: ./.github/workflows/container-image-build.yaml
    with:
      image-name: ${{ inputs.image-name }}
      create-artifacts: true
      # use dummy registry for build will be re-tagged
      registry: localhost
      registry-namespace: namespace
      build-args: ${{ inputs.build-args }}
      amd64-build-args: ${{ inputs.amd64-build-args }}
      arm64-build-args: ${{ inputs.arm64-build-args }}

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.sha }}-amd64
          path: /tmp

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.sha }}-arm64
          path: /tmp

      - name: Create manifest
        run: |
          podman manifest create localhost/${IMAGE_NAME}:manifest
          podman manifest add localhost/${IMAGE_NAME}:manifest oci-archive:/tmp/${COMMIT_SHA}-amd64-oci.tar
          podman manifest add localhost/${IMAGE_NAME}:manifest oci-archive:/tmp/${COMMIT_SHA}-arm64-oci.tar
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          COMMIT_SHA: ${{ github.sha }}

      - name: Tag, login and push to each registry
        shell: bash
        env:
          REGISTRIES: ${{ inputs.registries }}
          NAMESPACES: ${{ inputs.registry-namespaces }}
          PASSWORDS: ${{ secrets.registry-passwords }}
          IMAGE_NAME: ${{ inputs.image-name }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          # Pass all tags from the *first* registry's metadata action as a
          # base; we regenerate the tag list per registry in the loop.
        run: |
          # Convert newline-separated inputs into arrays
          mapfile -t REGISTRY_LIST  <<< "$REGISTRIES"
          mapfile -t NAMESPACE_LIST  <<< "$NAMESPACES"
          mapfile -t PASSWORD_LIST  <<< "$PASSWORDS"

          for i in "${!REGISTRY_LIST[@]}"; do
            REGISTRY="${REGISTRY_LIST[$i]}"
            NAMESPACE="${NAMESPACE_LIST[$i]}"
            PASSWORD="${PASSWORD_LIST[$i]}"
            IMAGE_BASE="${REGISTRY}/${NAMESPACE}/${IMAGE_NAME}"

            # Skip empty entries caused by trailing newlines
            [[ -z "$REGISTRY" || -z "$NAMESPACE" || -z "$PASSWORD" ]] && continue

            echo "──────────────────────────────────────────"
            echo "Registry : $REGISTRY"
            echo "User     : $NAMESPACE"
            echo "Image    : $IMAGE_BASE"
            echo "──────────────────────────────────────────"

            # Generate tags
            TAGS=()
            TAGS+=("${IMAGE_BASE}:latest")
            TAGS+=("${IMAGE_BASE}:${COMMIT_SHA:0:7}")
            # Add branch/tag name if available
            if [[ -n "$REF_NAME" ]]; then
              SAFE_REF="${REF_NAME//\//-}"   # replace '/' with '-'
              TAGS+=("${IMAGE_BASE}:${SAFE_REF}")
            fi
            # If the ref looks like a semver tag, add major and major.minor
            if [[ "$REF_NAME" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              TAGS+=("${IMAGE_BASE}:${MAJOR}.${MINOR}.${PATCH}")
              TAGS+=("${IMAGE_BASE}:${MAJOR}.${MINOR}")
              TAGS+=("${IMAGE_BASE}:${MAJOR}")
            fi

            # Re-tag the local manifest
            for TAG in "${TAGS[@]}"; do
              podman tag "localhost/${IMAGE_NAME}:manifest" "$TAG"
            done

            echo "$PASSWORD" | podman login "$REGISTRY" --username "$NAMESPACE" --password-stdin

            for TAG in "${TAGS[@]}"; do
              echo "Pushing $TAG"
              podman push "$TAG"
            done

            echo "✓ Done with $REGISTRY"
          done
